<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Panel klienta — Barabash Flow</title>
<link rel="shortcut icon" href="assets/images/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/fonts/remixicon.css">
<link rel="stylesheet" href="panel.css">
</head>
<body>
<div class="preloader" id="preloader"><div class="pre-logo">Barabash <span>Flow</span></div><div class="pre-bar"><div class="pre-bar-inner" id="preBar"></div></div></div>

<div class="panel-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <img src="assets/images/logo.png" alt="" onerror="this.style.display='none'">
      <div class="logo-text">Moje projekty</div>
    </div>
    <nav class="sidebar-nav">
      <a href="#" data-view="projects" class="active"><i class="ri-folder-line"></i>Projekty</a>
      <a href="#" data-view="notifications"><i class="ri-notification-3-line"></i>Powiadomienia<span class="badge" id="nBadge" style="display:none"></span></a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-avatar" id="sav">K</div>
        <div class="sidebar-user-info"><div class="sidebar-user-name" id="sname">Klient</div><div class="sidebar-user-role">Klient</div></div>
      </div>
      <button class="btn-logout" onclick="Auth.logout()"><i class="ri-logout-box-line"></i>Wyloguj się</button>
    </div>
  </aside>

  <main class="panel-main">
    <div class="topbar">
      <button class="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')"><i class="ri-menu-line"></i></button>
      <div><div class="topbar-title" id="pageTitle">Moje projekty</div><div class="topbar-sub" id="pageSub"></div></div>
    </div>
    <div class="content">

      <!-- PROJECTS LIST -->
      <div id="v-projects">
        <div class="card-title" style="margin-bottom:16px">Twoje projekty</div>
        <div id="proj-grid"></div>
      </div>

      <!-- PROJECT VIEW -->
      <div id="v-project" style="display:none">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px;flex-wrap:wrap">
          <button class="btn btn-outline btn-sm" onclick="nav('projects')"><i class="ri-arrow-left-line"></i></button>
          <div style="flex:1"><div style="font-size:18px;font-weight:700" id="pj-name">—</div><div style="font-size:12px;color:var(--text3)" id="pj-status-lbl">—</div></div>
          <span class="status" id="pj-badge">—</span>
        </div>
        <div class="tabs">
          <button class="tab-btn active" data-tab="chat">Czat</button>
          <button class="tab-btn" data-tab="posts">Projekt</button>
          <button class="tab-btn" data-tab="docs">Dokumenty</button>
        </div>
        <!-- CHAT TAB (first for client) -->
        <div class="tab-pane active" id="tab-chat">
          <div class="card" style="padding:0">
            <div class="chat-wrap">
              <div class="chat-messages" id="chat-box"></div>
              <div class="chat-input">
                <input class="form-control" id="chat-inp" placeholder="Napisz wiadomość...">
                <button class="btn btn-primary btn-sm" onclick="sendMsg()"><i class="ri-send-plane-fill"></i></button>
              </div>
            </div>
          </div>
        </div>
        <!-- POSTS TAB -->
        <div class="tab-pane" id="tab-posts">
          <div id="posts-list"></div>
        </div>
        <!-- DOCS TAB -->
        <div class="tab-pane" id="tab-docs">
          <div id="docs-list"></div>
        </div>
      </div>

      <!-- NOTIFICATIONS -->
      <div id="v-notifications" style="display:none">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
          <div class="card-title">Powiadomienia</div>
          <button class="btn btn-outline btn-sm" onclick="markAllRead()"><i class="ri-check-double-line"></i>Oznacz jako przeczytane</button>
        </div>
        <div class="card" style="padding:8px"><div id="notif-list"></div></div>
      </div>

    </div>
  </main>
</div>

<script src="panel.js"></script>
<script>
if(!Auth.requireClient()) throw 0;
runPreloader();
document.getElementById('sname').textContent = Auth.name||'Klient';
document.getElementById('sav').textContent   = avatarInitials(Auth.name);
document.getElementById('pageSub').textContent = 'Witaj, '+Auth.name;

let pid='',chatIv=null,chatLen=0,notifIv=null;

// ─── NAV ───
document.querySelectorAll('[data-view]').forEach(a=>a.addEventListener('click',e=>{e.preventDefault();nav(a.dataset.view);}));
document.querySelectorAll('.tab-btn').forEach(b=>b.addEventListener('click',()=>switchTab(b.dataset.tab)));

function nav(v){
  ['projects','project','notifications'].forEach(id=>{
    const el=document.getElementById('v-'+id);
    if(el)el.style.display=id===v?'block':'none';
  });
  document.querySelectorAll('[data-view]').forEach(a=>a.classList.toggle('active',a.dataset.view===v));
  if(chatIv&&v!=='project'){clearInterval(chatIv);chatIv=null;}
  const titles={projects:'Moje projekty',project:document.getElementById('pj-name').textContent,notifications:'Powiadomienia'};
  document.getElementById('pageTitle').textContent=titles[v]||'';
  if(v==='projects')    loadProjects();
  if(v==='notifications'){loadNotifications();markAllRead();}
}

function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.toggle('active',p.id==='tab-'+tab));
  if(tab==='chat')loadChat();
  if(tab==='posts')loadPosts();
  if(tab==='docs')loadDocs();
}

// ─── PROJECTS ───
async function loadProjects(){
  const projs=await dbGet('projects',`?client_id=eq.${Auth.userId}&select=*&order=updated_at.desc`);
  document.getElementById('proj-grid').innerHTML=projs.map(p=>`
    <div class="project-item" onclick="openProject('${p.id}','${esc(p.name)}','${p.status}')" style="margin-bottom:12px">
      <div class="project-icon">🚀</div>
      <div class="project-info"><div class="project-name">${esc(p.name)}</div><div class="project-meta">${esc(p.description||'Brak opisu')} · ${timeAgo(p.updated_at)}</div></div>
      <span class="status status-${p.status}">${statusLabel(p.status)}</span>
      <i class="ri-arrow-right-s-line" style="color:var(--text3)"></i>
    </div>`).join('')||emptyState('ri-folder-line','Brak projektów. Administrator wkrótce utworzy Twój projekt.');
}

async function openProject(id,name,status){
  pid=id;chatLen=0;
  document.getElementById('pj-name').textContent=name;
  document.getElementById('pj-status-lbl').textContent='Status: '+statusLabel(status);
  const b=document.getElementById('pj-badge');b.textContent=statusLabel(status);b.className='status status-'+status;
  nav('project');switchTab('chat');
}

// ─── CHAT ───
async function loadChat(){
  const msgs=await dbGet('messages',`?project_id=eq.${pid}&select=*,sender:profiles(display_name,email,role)&order=created_at.asc`);
  if(msgs.length===chatLen&&chatIv)return;chatLen=msgs.length;
  const LOGO='https://ztcyhlitwwganjhgbbtm.supabase.co/storage/v1/object/public/assets/logo.png';
  const box=document.getElementById('chat-box');
  box.innerHTML=msgs.map(m=>{
    const isMe=m.sender_id===Auth.userId;
    if(m.type==='system')return`<div class="chat-system-msg">${esc(m.content)}</div>`;
    const isAdmin=m.sender?.role==='admin';
    const av=isAdmin
      ?`<div class="chat-msg-avatar"><img src="${LOGO}" alt="DB" onerror="this.parentElement.textContent='DB'"></div>`
      :`<div class="chat-msg-avatar" style="background:linear-gradient(135deg,#7c3aed,var(--accent))">${avatarInitials(Auth.name)}</div>`;
    return`<div class="chat-msg ${isMe?'mine':''}">${av}<div>
      <div style="font-size:11px;color:var(--text3);margin-bottom:2px;${isMe?'text-align:right':''}">${esc(isAdmin?'Dmytrii Barabash':(m.sender?.display_name||m.sender?.email||'?'))}</div>
      <div class="chat-bubble">${esc(m.content)}</div>
      <div class="chat-msg-time">${timeAgo(m.created_at)}</div>
    </div></div>`;
  }).join('');
  box.scrollTop=box.scrollHeight;
  if(chatIv)clearInterval(chatIv);
  chatIv=setInterval(loadChat,4000);
}
async function sendMsg(){
  const inp=document.getElementById('chat-inp');
  const txt=inp.value.trim();if(!txt)return;inp.value='';
  await dbPost('messages',{project_id:pid,sender_id:Auth.userId,content:txt,type:'text'});
  loadChat();
}
document.getElementById('chat-inp').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}});

// ─── POSTS ───
async function loadPosts(){
  const [posts,comments]=await Promise.all([
    dbGet('posts',`?project_id=eq.${pid}&select=*&order=created_at.desc`),
    dbGet('post_comments',`?select=*,author:profiles(display_name,email)&order=created_at.asc`)
  ]);
  document.getElementById('posts-list').innerHTML=posts.map(p=>{
    const pc=comments.filter(c=>c.post_id===p.id);
    let media='';
    if(p.type==='image'&&p.url) media=`<img src="${esc(p.url)}" class="post-img" alt="">`;
    else if((p.type==='link'||p.type==='file')&&p.url) media=`<a href="${esc(p.url)}" class="post-link" target="_blank" rel="noopener">🔗 ${esc(p.url)}</a>`;
    return`<div class="post-card">
      <div class="post-header"><div class="post-type-icon">${postIcon(p.type)}</div><div><div class="post-title">${esc(p.title)}</div><div class="post-date">${timeAgo(p.created_at)}</div></div></div>
      ${p.content?`<div class="post-content">${esc(p.content)}</div>`:''}${media}
      <div class="comments-section">
        <div style="font-size:12px;font-weight:600;color:var(--text3);margin-bottom:8px">Komentarze (${pc.length})</div>
        ${pc.map(c=>`<div class="comment-item"><div class="comment-avatar">${avatarInitials(c.author?.display_name||c.author?.email)}</div><div class="comment-body"><div class="comment-author">${esc(c.author?.display_name||c.author?.email||'?')}</div><div class="comment-text">${esc(c.content)}</div></div></div>`).join('')||'<div style="font-size:12px;color:var(--text3)">Brak komentarzy</div>'}
        <div class="comment-form" style="margin-top:14px;display:flex;gap:8px">
          <input class="form-control" id="cm-${p.id}" placeholder="Dodaj komentarz...">
          <button class="btn btn-primary btn-sm" onclick="addComment('${p.id}')"><i class="ri-send-plane-line"></i></button>
        </div>
      </div>
    </div>`;
  }).join('')||emptyState('ri-file-text-line','Brak materiałów od administratora.');
}
async function addComment(postId){
  const inp=document.getElementById('cm-'+postId);
  const content=inp.value.trim();if(!content)return;inp.value='';
  await dbPost('post_comments',{post_id:postId,author_id:Auth.userId,content});
  // Also send as chat message
  await dbPost('messages',{project_id:pid,sender_id:Auth.userId,content:'💬 [komentarz] '+content,type:'text'});
  toast('Komentarz dodany ✅');loadPosts();
}

// ─── DOCS ───
async function loadDocs(){
  const docs=await dbGet('documents',`?project_id=eq.${pid}&select=*&order=created_at.desc`);
  document.getElementById('docs-list').innerHTML=docs.map(d=>`
    <div class="doc-item"><div class="doc-icon">📄</div>
      <div class="doc-info"><div class="doc-name">${esc(d.name)}</div><div class="doc-meta">${timeAgo(d.created_at)}</div></div>
      <a href="${esc(d.url)}" target="_blank" rel="noopener" class="doc-download"><i class="ri-download-line"></i></a>
    </div>`).join('')||emptyState('ri-folder-open-line','Brak dokumentów.');
}

// ─── NOTIFICATIONS ───
async function loadNotifications(){
  const notifs=await dbGet('notifications',`?user_id=eq.${Auth.userId}&select=*&order=created_at.desc`);
  document.getElementById('notif-list').innerHTML=notifs.map(n=>`
    <div class="notif-item ${n.is_read?'':'unread'}">
      <div class="notif-dot ${n.is_read?'read':''}"></div>
      <div style="flex:1"><div class="notif-content">${n.content}</div><div class="notif-time">${timeAgo(n.created_at)}</div></div>
    </div>`).join('')||emptyState('ri-notification-off-line','Brak powiadomień');
  updateBadge(notifs);
}
async function markAllRead(){
  await dbPatch('notifications',`user_id=eq.${Auth.userId}&is_read=eq.false`,{is_read:true});
  document.getElementById('nBadge').style.display='none';
  if(document.getElementById('v-notifications').style.display!=='none')loadNotifications();
}
async function updateBadge(notifs){
  const unread=notifs?notifs.filter(n=>!n.is_read).length:(await dbGet('notifications',`?user_id=eq.${Auth.userId}&is_read=eq.false&select=id`)).length;
  const b=document.getElementById('nBadge');
  if(unread>0){b.style.display='inline-flex';b.textContent=unread;}else b.style.display='none';
}
function startNotifPoll(){
  notifIv=setInterval(async()=>{
    const notifs=await dbGet('notifications',`?user_id=eq.${Auth.userId}&select=*&order=created_at.desc`);
    updateBadge(notifs);
  },30000);
}

// ─── INIT ───
loadProjects();
(async()=>{const n=await dbGet('notifications',`?user_id=eq.${Auth.userId}&is_read=eq.false&select=id`);updateBadge(n);})();
startNotifPoll();
</script>
</body>
</html>
