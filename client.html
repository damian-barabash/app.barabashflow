<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Panel klienta — Barabash Flow</title>
<link rel="shortcut icon" href="assets/images/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/fonts/remixicon.css">
<link rel="stylesheet" href="panel.css">
</head>
<body>
<div class="preloader" id="preloader"><div class="pre-logo">Barabash <span>Flow</span></div><div class="pre-track"><div class="pre-bar" id="preBar"></div></div></div>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<div class="layout">
<aside class="sidebar" id="sidebar">
  <div class="sidebar-top">
    <img src="assets/images/logo.png" alt="" onerror="this.style.display='none'">
    <div class="brand">Mój panel</div>
    <button class="sidebar-close" onclick="closeSidebar()"><i class="ri-close-line"></i></button>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-link active" data-view="projects"><i class="ri-folder-line"></i>Projekty</div>
    <div class="nav-link" data-view="notifications"><i class="ri-notification-3-line"></i>Powiadomienia<span class="nav-badge" id="nb-notif"></span></div>
  </nav>
  <div class="sidebar-bottom">
    <div class="user-card">
      <div class="user-av" id="clientAv">K</div>
      <div class="user-info"><div class="user-name" id="clientName">Klient</div><div class="user-role">Klient</div></div>
    </div>
    <button class="btn-logout" onclick="Auth.logout()"><i class="ri-logout-box-line"></i>Wyloguj się</button>
  </div>
</aside>

<main class="main">
  <div class="topbar">
    <button class="menu-btn" onclick="openSidebar()"><i class="ri-menu-line"></i></button>
    <div><div class="topbar-title" id="pageTitle">Moje projekty</div><div class="topbar-sub" id="pageSub"></div></div>
  </div>
  <div class="content">

    <!-- PROJECTS -->
    <div id="v-projects"><div id="proj-grid"></div></div>

    <!-- PROJECT -->
    <div id="v-project" style="display:none">
      <div class="page-header">
        <button class="btn btn-outline btn-sm" onclick="nav('projects')"><i class="ri-arrow-left-line"></i></button>
        <div><h2 id="pj-name">—</h2><div class="sub" id="pj-status">—</div></div>
        <span class="badge" id="pj-badge" style="margin-left:auto"></span>
      </div>
      <div class="tabs">
        <button class="tab-btn active" data-tab="chat">Czat</button>
        <button class="tab-btn" data-tab="posts">Projekt</button>
        <button class="tab-btn" data-tab="docs">Dokumenty</button>
      </div>

      <div class="tab-pane active" id="tab-chat">
        <div class="card" style="padding:0;overflow:hidden">
          <div class="chat-wrap">
            <div class="chat-msgs" id="chat-msgs"></div>
            <div class="chat-input-row">
              <input class="form-control" id="chat-inp" placeholder="Napisz wiadomość...">
              <button class="btn btn-primary btn-sm" onclick="sendMsg()"><i class="ri-send-plane-fill"></i></button>
            </div>
          </div>
        </div>
      </div>

      <div class="tab-pane" id="tab-posts"><div id="posts-list"></div></div>
      <div class="tab-pane" id="tab-docs"><div id="docs-list"></div></div>
    </div>

    <!-- NOTIFICATIONS -->
    <div id="v-notifications" style="display:none">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <div class="card-title">Powiadomienia</div>
        <button class="btn btn-outline btn-sm" onclick="markAllRead()"><i class="ri-check-double-line"></i>Oznacz jako przeczytane</button>
      </div>
      <div class="card" style="padding:8px"><div id="notif-list"></div></div>
    </div>

  </div>
</main>
</div>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()"><i class="ri-close-line"></i></button>
  <div id="lb-content"></div>
</div>

<script src="panel.js"></script>
<script>
if(!Auth.requireClient()) throw 0;
runPreloader();

const myName  = Auth.name  || Auth.email || 'Klient';
const myEmail = Auth.email || '';
document.getElementById('clientName').textContent = myName;
document.getElementById('clientAv').textContent   = initials(myName) || 'K';
document.getElementById('pageSub').textContent    = 'Witaj, ' + myName;

// Pre-cache own profile so avatar is correct immediately
_profileCache[Auth.userId] = {
  id: Auth.userId,
  display_name: myName,
  email: myEmail,
  role: 'client'
};

let PID='', chatLen=0, chatIv=null, pollIv=null;
let _lastMsgIdForPopup=null, _lastNotifId=null;

// NAV
document.querySelectorAll('.nav-link[data-view]').forEach(a =>
  a.addEventListener('click', () => { nav(a.dataset.view); closeSidebar(); })
);
document.querySelectorAll('.tab-btn').forEach(b =>
  b.addEventListener('click', () => switchTab(b.dataset.tab))
);

function nav(v) {
  ['projects','project','notifications'].forEach(id => {
    const el = document.getElementById('v-'+id);
    if (el) el.style.display = id===v ? 'block' : 'none';
  });
  document.querySelectorAll('.nav-link[data-view]').forEach(a => a.classList.toggle('active', a.dataset.view===v));
  document.getElementById('pageTitle').textContent = {
    projects:'Moje projekty',
    project: document.getElementById('pj-name').textContent,
    notifications:'Powiadomienia'
  }[v]||'';
  if (chatIv && v!=='project') { clearInterval(chatIv); chatIv=null; }
  if (v==='projects')     loadProjects();
  if (v==='notifications') { loadNotifs(); markAllRead(); }
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab===tab));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.toggle('active', p.id==='tab-'+tab));
  if (tab==='chat')  { chatLen=0; loadChat(); }
  if (tab==='posts') loadPosts();
  if (tab==='docs')  loadDocs();
}

// ── PROJECTS ──
async function loadProjects() {
  const projs = await dbGet('projects', `?client_id=eq.${Auth.userId}&select=*&order=updated_at.desc`);
  document.getElementById('proj-grid').innerHTML = projs.map(p => `
    <div class="proj-card" onclick="openProject('${p.id}','${esc(p.name)}','${p.status}')">
      <div class="proj-icon">🚀</div>
      <div class="proj-info">
        <div class="proj-name">${esc(p.name)}</div>
        <div class="proj-meta">${esc(p.description||'—')} · ${timeAgo(p.updated_at)}</div>
      </div>
      <span class="badge badge-${statusClass(p.status)}">${statusLabel(p.status)}</span>
      <i class="ri-arrow-right-s-line item-arrow"></i>
    </div>`).join('') || emptyHTML('ri-folder-line','Brak projektów. Administrator wkrótce utworzy Twój projekt.');
}

async function openProject(id, name, status) {
  PID=id; chatLen=0; _lastMsgIdForPopup=null;
  document.getElementById('pj-name').textContent = name;
  document.getElementById('pj-status').textContent = 'Status: '+statusLabel(status);
  const b = document.getElementById('pj-badge');
  b.textContent = statusLabel(status);
  b.className = 'badge badge-'+statusClass(status);
  nav('project'); switchTab('chat');

  // Popup poll — new admin messages while viewing project
  if (pollIv) clearInterval(pollIv);
  pollIv = setInterval(async () => {
    const msgs = await dbGet('messages',
      `?project_id=eq.${PID}&select=id,content,sender_id&order=created_at.desc&limit=1`);
    if (!msgs.length) return;
    const m = msgs[0];
    if (m.sender_id === Auth.userId) return; // own message
    if (m.id !== _lastMsgIdForPopup) {
      if (_lastMsgIdForPopup) { // not first load
        await loadProfiles([m.sender_id]);
        const profile = getProfile(m.sender_id);
        const senderName = profile?.display_name || profile?.email || 'Dmytrii Barabash';
        showPopup({
          title: senderName,
          text: m.content,
          icon: LOGO_URL,
          actionLabel: 'Przejdź do czatu',
          onAction: () => switchTab('chat')
        });
      }
      _lastMsgIdForPopup = m.id;
    }
  }, 5000);
}

// ── CHAT ──
// Uses renderChat() from panel.js which:
//   1. Fetches messages (no join — just sender_id)
//   2. Fetches all sender profiles separately via profile cache
//   3. Builds DOM elements via createMsgElement() (no HTML strings)
// This fixes:
//   - ? avatar for admin (profile loaded separately, bypasses RLS join issue)
//   - Correct display_name from DB for both admin and client
//   - Read receipts (✓ / ✓✓ purple when read)
async function loadChat() {
  const newLen = await renderChat(PID, Auth.userId, 'chat-msgs');

  // After rendering, mark unread messages from admin as read
  const msgs = await dbGet('messages',
    `?project_id=eq.${PID}&select=id,sender_id&order=created_at.asc`);
  const reads = await dbGet('message_reads', `?select=message_id,user_id`);
  const unread = msgs.filter(m =>
    m.sender_id !== Auth.userId &&
    !reads.some(r => r.message_id===m.id && r.user_id===Auth.userId)
  );
  if (unread.length > 0) {
    edgeFn('mark-messages-read', {
      messageIds: unread.map(m => m.id),
      projectId: PID,
      userId: Auth.userId
    }).catch(() => {});
  }

  if (newLen === chatLen && chatIv) return;
  chatLen = newLen;
  if (chatIv) clearInterval(chatIv);
  chatIv = setInterval(loadChat, 4000);
}

async function sendMsg() {
  const inp = document.getElementById('chat-inp');
  const txt = inp.value.trim(); if (!txt) return; inp.value='';
  await dbPost('messages', {project_id:PID, sender_id:Auth.userId, content:txt, type:'text'});
  loadChat();
}
document.getElementById('chat-inp').addEventListener('keydown', e => {
  if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
});

// ── POSTS ──
async function loadPosts() {
  const [posts, comments] = await Promise.all([
    dbGet('posts', `?project_id=eq.${PID}&select=*&order=created_at.desc`),
    dbGet('post_comments', `?select=*,author:profiles(display_name,email)&order=created_at.asc`)
  ]);
  document.getElementById('posts-list').innerHTML = posts.map(p => {
    const pc = comments.filter(c => c.post_id===p.id);
    return `<div class="post-card">
      <div class="post-head">
        <div class="post-ico">${postIcon(p.type)}</div>
        <div><div class="post-title">${esc(p.title)}</div><div class="post-date">${timeAgo(p.created_at)}</div></div>
      </div>
      ${p.content ? `<div class="post-body">${esc(p.content)}</div>` : ''}
      ${renderFilePreview(p.file_url||p.url, p.file_name||p.url, p.mime_type)}
      <div class="comments-section">
        <div class="comments-title">Komentarze (${pc.length})</div>
        ${pc.map(c => `
          <div class="comment-item">
            <div class="comment-av">${initials(c.author?.display_name||c.author?.email)||'?'}</div>
            <div class="comment-body">
              <div class="comment-author">${esc(c.author?.display_name||c.author?.email||'?')}</div>
              <div class="comment-text">${esc(c.content)}</div>
            </div>
          </div>`).join('') || '<div style="font-size:12px;color:var(--t3);padding:4px 0">Brak komentarzy</div>'}
        <div class="comment-form">
          <input class="form-control" id="cm-${p.id}" placeholder="Dodaj komentarz...">
          <button class="btn btn-primary btn-sm" onclick="addComment('${p.id}','${esc(p.title)}')">
            <i class="ri-send-plane-line"></i>
          </button>
        </div>
      </div>
    </div>`;
  }).join('') || emptyHTML('ri-file-text-line','Brak materiałów od administratora.');
}

async function addComment(postId, postTitle) {
  const inp = document.getElementById('cm-'+postId);
  const content = inp.value.trim(); if (!content) return; inp.value='';
  await dbPost('post_comments', {post_id:postId, author_id:Auth.userId, content});
  await dbPost('messages', {
    project_id: PID, sender_id: Auth.userId,
    content: `💬 [komentarz do "${postTitle}"]: ${content}`, type:'text'
  });
  toast('Komentarz dodany ✅'); loadPosts();
}

// ── DOCS ──
async function loadDocs() {
  const docs = await dbGet('documents', `?project_id=eq.${PID}&select=*&order=created_at.desc`);
  document.getElementById('docs-list').innerHTML = docs.map(d => {
    const url=d.file_url||d.url, mime=d.mime_type||'';
    const isImg=mime.startsWith('image/'), isPdf=mime==='application/pdf';
    return `<div class="doc-item">
      <div class="doc-icon">${isImg?'🖼️':isPdf?'📄':'📎'}</div>
      <div class="doc-info">
        <div class="doc-name">${esc(d.name)}</div>
        <div class="doc-meta">${fmtSize(d.file_size)} · ${timeAgo(d.created_at)}</div>
      </div>
      ${(isImg||isPdf) ? `<button class="doc-dl" onclick="openLightbox('${isImg?'img':'pdf'}','${esc(url)}')"><i class="ri-eye-line"></i></button>` : ''}
      <a href="${esc(url)}" download="${esc(d.name)}" target="_blank" class="doc-dl"><i class="ri-download-line"></i></a>
    </div>`;
  }).join('') || emptyHTML('ri-folder-open-line','Brak dokumentów.');
}

// ── NOTIFICATIONS ──
async function loadNotifs() {
  const notifs = await dbGet('notifications', `?user_id=eq.${Auth.userId}&select=*&order=created_at.desc`);
  document.getElementById('notif-list').innerHTML = notifs.map(n => `
    <div class="notif-item ${n.is_read?'':'unread'}">
      <div class="notif-dot ${n.is_read?'read':'new'}"></div>
      <div style="flex:1">
        <div class="notif-text">${n.content}</div>
        <div class="notif-time">${timeAgo(n.created_at)}</div>
      </div>
    </div>`).join('') || emptyHTML('ri-notification-off-line','Brak powiadomień');
  updateNotifBadge(notifs);
}

async function markAllRead() {
  await dbPatch('notifications', `user_id=eq.${Auth.userId}&is_read=eq.false`, {is_read:true});
  document.getElementById('nb-notif').classList.remove('show');
  const v = document.getElementById('v-notifications');
  if (v && v.style.display !== 'none') loadNotifs();
}

function updateNotifBadge(notifs) {
  const unread = (notifs||[]).filter(n => !n.is_read).length;
  const nb = document.getElementById('nb-notif');
  if (unread>0) { nb.textContent=unread; nb.classList.add('show'); }
  else nb.classList.remove('show');
}

// ── INIT ──
loadProjects();
(async () => {
  const n = await dbGet('notifications', `?user_id=eq.${Auth.userId}&is_read=eq.false&select=id`);
  updateNotifBadge(n);
})();

// Poll notifications every 30s
setInterval(async () => {
  const n = await dbGet('notifications',
    `?user_id=eq.${Auth.userId}&is_read=eq.false&select=id,content,type,project_id&order=created_at.desc`);
  updateNotifBadge(n);
  if (n.length && n[0].id !== _lastNotifId) {
    if (_lastNotifId) {
      showPopup({
        title: 'Barabash Flow',
        text: n[0].content.replace(/<[^>]+>/g,''),
        icon: LOGO_URL,
        actionLabel: 'Zobacz powiadomienia',
        onAction: () => nav('notifications')
      });
    }
    _lastNotifId = n[0].id;
  }
}, 30000);
</script>
</body>
</html>
