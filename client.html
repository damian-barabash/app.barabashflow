<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Panel klienta — Barabash Flow</title>
<link rel="shortcut icon" href="assets/images/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/fonts/remixicon.css">
<link rel="stylesheet" href="panel.css">
</head>
<body>
<div class="preloader" id="preloader"><div class="pre-logo">Barabash <span>Flow</span></div><div class="pre-track"><div class="pre-bar" id="preBar"></div></div></div>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<div class="layout">
<aside class="sidebar" id="sidebar">
  <div class="sidebar-top">
    <img src="assets/images/logo.png" alt="" onerror="this.style.display='none'">
    <div class="brand">Mój panel</div>
    <button class="sidebar-close" onclick="closeSidebar()"><i class="ri-close-line"></i></button>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-link active" data-view="projects"><i class="ri-folder-line"></i>Projekty</div>
    <div class="nav-link" data-view="notifications"><i class="ri-notification-3-line"></i>Powiadomienia<span class="nav-badge" id="nb-notif"></span></div>
  </nav>
  <div class="sidebar-bottom">
    <div class="user-card">
      <div class="user-av" id="clientAv">K</div>
      <div class="user-info"><div class="user-name" id="clientName">Klient</div><div class="user-role">Klient</div></div>
    </div>
    <button class="btn-logout" onclick="Auth.logout()"><i class="ri-logout-box-line"></i>Wyloguj się</button>
  </div>
</aside>

<main class="main">
  <div class="topbar">
    <button class="menu-btn" onclick="openSidebar()"><i class="ri-menu-line"></i></button>
    <div><div class="topbar-title" id="pageTitle">Moje projekty</div><div class="topbar-sub" id="pageSub"></div></div>
  </div>
  <div class="content">

    <div id="v-projects"><div id="proj-grid"></div></div>

    <div id="v-project" style="display:none">
      <div class="page-header">
        <button class="btn btn-outline btn-sm" onclick="nav('projects')"><i class="ri-arrow-left-line"></i></button>
        <div><h2 id="pj-name">—</h2><div class="sub" id="pj-status">—</div></div>
        <span class="badge" id="pj-badge" style="margin-left:auto"></span>
      </div>
      <div class="tabs">
        <button class="tab-btn active" data-tab="chat">Czat</button>
        <button class="tab-btn" data-tab="posts">Projekt</button>
        <button class="tab-btn" data-tab="docs">Dokumenty</button>
      </div>

      <div class="tab-pane active" id="tab-chat">
        <div class="card" style="padding:0;overflow:hidden">
          <div class="chat-wrap">
            <div class="chat-msgs" id="chat-msgs"></div>
            <div id="chat-typing"></div>
            <div class="chat-file-preview" id="chat-file-preview">
              <i class="ri-attachment-2" style="font-size:16px;color:var(--a)"></i>
              <div class="chat-file-preview-name" id="chat-file-preview-name">—</div>
              <button class="chat-file-preview-cancel" onclick="cancelChatFile()" title="Usuń"><i class="ri-close-line"></i></button>
            </div>
            <div class="chat-input-row" id="chat-input-row">
              <input class="form-control" id="chat-inp" placeholder="Napisz wiadomość...">
              <button class="btn btn-primary btn-sm" onclick="sendMsg()"><i class="ri-send-plane-fill"></i></button>
            </div>
          </div>
        </div>
      </div>

      <div class="tab-pane" id="tab-posts"><div id="posts-list"></div></div>
      <div class="tab-pane" id="tab-docs">
        <div class="card" style="margin-bottom:16px">
          <div class="card-title" style="margin-bottom:14px">Dodaj dokument</div>
          <div class="form-group">
            <label class="form-label">Plik</label>
            <div class="upload-area" id="cl-dc-upload-area">
              <input type="file" id="cl-dc-file" accept=".pdf,.doc,.docx,.ppt,.pptx,.xls,.xlsx,.zip,.txt,image/*" onchange="onFileSelected('cl-dc-file','cl-dc-preview','cl-dc-upload-area','_clDcFile')">
              <i class="ri-folder-upload-line"></i>
              <p>Kliknij lub przeciągnij dokument</p>
              <span>PDF, Word, Excel, Zdjęcia — maks. 50MB</span>
            </div>
            <div id="cl-dc-preview" style="margin-top:8px"></div>
            <div class="upload-progress" id="cl-dc-progress"><div class="upload-progress-bar" id="cl-dc-bar"></div></div>
          </div>
          <div class="form-group"><label class="form-label">Nazwa (opcjonalna)</label><input class="form-control" id="cl-dc-name" placeholder="Zostaw puste = nazwa pliku"></div>
          <button class="btn btn-primary btn-sm" onclick="clientAddDoc()" id="cl-dc-btn"><i class="ri-upload-line"></i>Dodaj dokument</button>
        </div>
        <div id="docs-list"></div>
      </div>
    </div>

    <div id="v-notifications" style="display:none">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <div class="card-title">Powiadomienia</div>
        <button class="btn btn-outline btn-sm" onclick="markAllRead()"><i class="ri-check-double-line"></i>Oznacz jako przeczytane</button>
      </div>
      <div class="card" style="padding:8px"><div id="notif-list"></div></div>
    </div>

  </div>
</main>
</div>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()"><i class="ri-close-line"></i></button>
  <div id="lb-content"></div>
</div>

<script src="panel.js"></script>
<script>
if (!Auth.requireClient()) throw 0;
runPreloader();

const myName  = Auth.name  || Auth.email || 'Klient';
const myEmail = Auth.email || '';
document.getElementById('clientName').textContent = myName;
document.getElementById('clientAv').textContent   = initials(myName) || 'K';
document.getElementById('pageSub').textContent    = 'Witaj, ' + myName;

// Pre-cache own profile
_profileCache[Auth.userId] = {id:Auth.userId, display_name:myName, email:myEmail, role:'client'};

let PID='', chatLen=0, chatIv=null, pollIv=null;
let _lastMsgIdForPopup=null, _lastNotifId=null;

document.querySelectorAll('.nav-link[data-view]').forEach(a =>
  a.addEventListener('click', () => { nav(a.dataset.view); closeSidebar(); })
);
document.querySelectorAll('.tab-btn').forEach(b =>
  b.addEventListener('click', () => switchTab(b.dataset.tab))
);

function nav(v) {
  ['projects','project','notifications'].forEach(id => {
    const el = document.getElementById('v-'+id); if (el) el.style.display = id===v?'block':'none';
  });
  document.querySelectorAll('.nav-link[data-view]').forEach(a => a.classList.toggle('active', a.dataset.view===v));
  document.getElementById('pageTitle').textContent = {
    projects:'Moje projekty',
    project: document.getElementById('pj-name').textContent,
    notifications:'Powiadomienia'
  }[v]||'';
  if (chatIv && v!=='project') { clearInterval(chatIv); chatIv=null; }
  if (v==='projects')     loadProjects();
  if (v==='notifications') { loadNotifs(); markAllRead(); }
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab===tab));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.toggle('active', p.id==='tab-'+tab));
  if (tab==='chat')  { chatLen=0; initChatUI(); loadChat(); }
  if (tab==='posts') loadPosts();
  if (tab==='docs')  loadDocs();
}

// ── PROJECTS ──
async function loadProjects() {
  const projs = await dbGet('projects', `?client_id=eq.${Auth.userId}&select=*&order=updated_at.desc`);
  document.getElementById('proj-grid').innerHTML = projs.map(p => `
    <div class="proj-card" onclick="openProject('${p.id}','${esc(p.name)}','${p.status}')">
      <div class="proj-icon">🚀</div>
      <div class="proj-info">
        <div class="proj-name">${esc(p.name)}</div>
        <div class="proj-meta">${esc(p.description||'—')} · ${timeAgo(p.updated_at)}</div>
      </div>
      <span class="badge badge-${statusClass(p.status)}">${statusLabel(p.status)}</span>
      <i class="ri-arrow-right-s-line item-arrow"></i>
    </div>`).join('') || emptyHTML('ri-folder-line','Brak projektów. Administrator wkrótce utworzy Twój projekt.');
}

async function openProject(id, name, status) {
  PID=id; chatLen=0; _lastMsgIdForPopup=null; _chatUIInited=false;
  window._currentPID = id;
  document.getElementById('pj-name').textContent = name;
  document.getElementById('pj-status').textContent = 'Status: '+statusLabel(status);
  const b = document.getElementById('pj-badge');
  b.textContent = statusLabel(status); b.className = 'badge badge-'+statusClass(status);
  nav('project'); switchTab('chat');

  if (pollIv) clearInterval(pollIv);
  pollIv = setInterval(async () => {
    const msgs = await dbGet('messages',
      `?project_id=eq.${PID}&select=id,content,sender_id&order=created_at.desc&limit=1`);
    if (!msgs.length) return;
    const m = msgs[0];
    if (m.sender_id === Auth.userId) return;
    if (m.id !== _lastMsgIdForPopup) {
      if (_lastMsgIdForPopup) {
        await loadProfiles([m.sender_id]);
        const profile = getProfile(m.sender_id);
        showPopup({
          title: profile?.display_name || profile?.email || 'Dmytrii Barabash',
          text:  m.content,
          icon:  LOGO_URL,
          actionLabel: 'Przejdź do czatu',
          onAction: () => switchTab('chat')
        });
      }
      _lastMsgIdForPopup = m.id;
    }
  }, 5000);
}

// ── CHAT ──
let _chatFileToSend=null, _sending=false, _chatUIInited=false;

function initChatUI(){
  if(_chatUIInited) return;
  _chatUIInited=true;
  setupChatFileInput('chat-input-row',(file)=>{
    _chatFileToSend=file;
    document.getElementById('chat-file-preview-name').textContent=file.name+' ('+fmtSize(file.size)+')';
    document.getElementById('chat-file-preview').classList.add('show');
  });
  const inp=document.getElementById('chat-inp');
  inp.onkeydown=e=>{
    if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();return;}
    onChatInputKey(e,PID);
  };
}
function cancelChatFile(){_chatFileToSend=null;document.getElementById('chat-file-preview').classList.remove('show');}

async function loadChat() {
  const allMsgs  = await dbGet('messages', `?project_id=eq.${PID}&select=id,sender_id&order=created_at.asc`);
  const allReads = await dbGet('message_reads', `?select=message_id,user_id`);
  const unread = allMsgs.filter(m =>
    m.sender_id !== Auth.userId &&
    !allReads.some(r => r.message_id===m.id && r.user_id===Auth.userId)
  );
  if (unread.length > 0) {
    edgeFn('mark-messages-read', {messageIds:unread.map(m=>m.id),projectId:PID,userId:Auth.userId}).catch(()=>{});
  }
  const newLen = await renderChat(PID, Auth.userId, 'chat-msgs');
  pollTyping(PID,Auth.userId,'chat-typing');
  if (newLen === chatLen && chatIv) return;
  chatLen = newLen;
  if (chatIv) clearInterval(chatIv);
  chatIv = setInterval(()=>{loadChat();pollTyping(PID,Auth.userId,'chat-typing');}, 4000);
}

async function sendMsg() {
  if(_sending) return;
  const inp=document.getElementById('chat-inp'),txt=inp.value.trim();
  if(!txt&&!_chatFileToSend)return;

  _sending=true;
  inp.value='';
  inp.disabled=true;
  setTyping(PID,false); clearTimeout(_typingTimer);

  // Capture and clear immediately
  const fileToSend=_chatFileToSend;
  _chatFileToSend=null;
  document.getElementById('chat-file-preview').classList.remove('show');

  let msgData={project_id:PID,sender_id:Auth.userId,type:'text'};
  try{
    if(fileToSend){
      toast('Wysyłanie pliku...','success');
      const up=await uploadFile(fileToSend,'post-files');
      msgData.file_url=up.url;msgData.file_name=up.name;msgData.file_size=up.size;msgData.mime_type=up.mime;
      msgData.content=txt||'';
    }else{
      msgData.content=txt;
    }
    await dbPost('messages',msgData);
    loadChat();
  }catch(e){
    toast('Błąd wysyłania: '+e.message,'error');
    inp.value=txt;
    if(fileToSend){_chatFileToSend=fileToSend;document.getElementById('chat-file-preview').classList.add('show');}
  }finally{
    _sending=false;
    inp.disabled=false;
    inp.focus();
  }
}

// ── POSTS ──
async function loadPosts() {
  const [posts, comments] = await Promise.all([
    dbGet('posts',         `?project_id=eq.${PID}&select=*&order=created_at.desc`),
    dbGet('post_comments', `?select=*,author:profiles(display_name,email)&order=created_at.asc`)
  ]);
  document.getElementById('posts-list').innerHTML = posts.map(p => {
    const pc = comments.filter(c => c.post_id===p.id);
    return `<div class="post-card">
      <div class="post-head"><div class="post-ico">${postIcon(p.type)}</div>
        <div><div class="post-title">${esc(p.title)}</div><div class="post-date">${timeAgo(p.created_at)}</div></div>
      </div>
      ${p.content ? `<div class="post-body">${esc(p.content)}</div>` : ''}
      ${renderFilePreview(p.file_url||p.url, p.file_name||p.url, p.mime_type)}
      <div class="comments-section">
        <div class="comments-title">Komentarze (${pc.length})</div>
        ${pc.map(c => `
          <div class="comment-item">
            <div class="comment-av">${initials(c.author?.display_name||c.author?.email)||'?'}</div>
            <div class="comment-body">
              <div class="comment-author">${esc(c.author?.display_name||c.author?.email||'?')}</div>
              <div class="comment-text">${esc(c.content)}</div>
            </div>
          </div>`).join('') || '<div style="font-size:12px;color:var(--t3);padding:4px 0">Brak komentarzy</div>'}
        <div class="comment-form">
          <input class="form-control" id="cm-${p.id}" placeholder="Dodaj komentarz...">
          <button class="btn btn-primary btn-sm" onclick="addComment('${p.id}','${esc(p.title)}')">
            <i class="ri-send-plane-line"></i>
          </button>
        </div>
      </div>
    </div>`;
  }).join('') || emptyHTML('ri-file-text-line','Brak materiałów od administratora.');
}

async function addComment(postId, postTitle) {
  const inp = document.getElementById('cm-'+postId);
  const content = inp.value.trim(); if (!content) return; inp.value='';
  await dbPost('post_comments', {post_id:postId, author_id:Auth.userId, content});
  await dbPost('messages', {
    project_id:PID, sender_id:Auth.userId,
    content:`💬 [komentarz do "${postTitle}"]: ${content}`, type:'text'
  });
  toast('Komentarz dodany ✅'); loadPosts();
}

// ── DOCS ──
async function clientAddDoc() {
  if (!window._clDcFile) { toast('Wybierz plik','error'); return; }
  const btn = document.getElementById('cl-dc-btn');
  btn.disabled=true; btn.innerHTML='<span class="spin"><i class="ri-loader-4-line"></i></span>&nbsp;Przesyłanie...';
  try {
    document.getElementById('cl-dc-progress').classList.add('show');
    document.getElementById('cl-dc-bar').style.width='40%';
    const up = await uploadFile(window._clDcFile, 'doc-files');
    document.getElementById('cl-dc-bar').style.width='100%';
    const name = document.getElementById('cl-dc-name').value.trim() || up.name;
    await dbPost('documents', {
      project_id:PID, uploaded_by:Auth.userId,
      name, url:up.url, file_url:up.url, mime_type:up.mime, file_size:up.size
    });
    document.getElementById('cl-dc-name').value='';
    document.getElementById('cl-dc-preview').innerHTML='';
    document.getElementById('cl-dc-upload-area').style.borderColor='';
    window._clDcFile = null;
    setTimeout(()=>document.getElementById('cl-dc-progress').classList.remove('show'), 800);
    toast('Dokument dodany ✅'); loadDocs();
  } catch(e) { toast('Błąd przesyłania: '+e.message,'error'); }
  finally { btn.disabled=false; btn.innerHTML='<i class="ri-upload-line"></i>Dodaj dokument'; }
}

async function loadDocs() {
  const docs = await dbGet('documents', `?project_id=eq.${PID}&select=*&order=created_at.desc`);
  document.getElementById('docs-list').innerHTML = docs.map(d => {
    const url=d.file_url||d.url, mime=d.mime_type||'';
    const isImg=mime.startsWith('image/'), isPdf=mime==='application/pdf';
    return `<div class="doc-item">
      <div class="doc-icon">${isImg?'🖼️':isPdf?'📄':'📎'}</div>
      <div class="doc-info"><div class="doc-name">${esc(d.name)}</div><div class="doc-meta">${fmtSize(d.file_size)} · ${timeAgo(d.created_at)}</div></div>
      ${(isImg||isPdf) ? `<button class="doc-dl" onclick="openLightbox('${isImg?'img':'pdf'}','${esc(url)}')"><i class="ri-eye-line"></i></button>` : ''}
      <a href="${esc(url)}" download="${esc(d.name)}" target="_blank" class="doc-dl"><i class="ri-download-line"></i></a>
    </div>`;
  }).join('') || emptyHTML('ri-folder-open-line','Brak dokumentów.');
}

// ── NOTIFICATIONS ──
async function loadNotifs() {
  const notifs = await dbGet('notifications', `?user_id=eq.${Auth.userId}&select=*&order=created_at.desc`);
  document.getElementById('notif-list').innerHTML = notifs.map(n => `
    <div class="notif-item ${n.is_read?'':'unread'}">
      <div class="notif-dot ${n.is_read?'read':'new'}"></div>
      <div style="flex:1">
        <div class="notif-text">${n.content}</div>
        <div class="notif-time">${timeAgo(n.created_at)}</div>
      </div>
    </div>`).join('') || emptyHTML('ri-notification-off-line','Brak powiadomień');
  updateNotifBadge(notifs);
}

async function markAllRead() {
  await dbPatch('notifications', `user_id=eq.${Auth.userId}&is_read=eq.false`, {is_read:true});
  document.getElementById('nb-notif').classList.remove('show');
  const v = document.getElementById('v-notifications');
  if (v && v.style.display!=='none') loadNotifs();
}

function updateNotifBadge(notifs) {
  const unread = (notifs||[]).filter(n => !n.is_read).length;
  const nb = document.getElementById('nb-notif');
  if (unread>0) { nb.textContent=unread; nb.classList.add('show'); } else nb.classList.remove('show');
}

// ── SCHEDULED NOTIFICATIONS ──
// Meeting popup stays as widget, text popup disappears on close

let _meetingWidget = null;
let _meetingWidgetIv = null;

async function checkScheduledNotifications() {
  const now = new Date().toISOString();
  const snots = await dbGet('scheduled_notifications',
    `?user_id=eq.${Auth.userId}&is_active=eq.true&select=*&order=created_at.desc`);

  for (const sn of snots) {
    if (sn.type === 'text' && !sn.dismissed_at) {
      showTextNotifPopup(sn);
    }
    if (sn.type === 'meeting' && sn.scheduled_at) {
      const meetTime = new Date(sn.scheduled_at);
      const isPast = meetTime < new Date(Date.now() - 60*60*1000); // expired 1h ago
      if (!isPast) {
        showMeetingPopup(sn);
      } else {
        // Auto-deactivate expired meetings
        await fetch(`${SB}/rest/v1/scheduled_notifications?id=eq.${sn.id}`,{method:'PATCH',headers:hdr(),body:JSON.stringify({is_active:false})});
      }
    }
  }
}

function showTextNotifPopup(sn) {
  // Don't show twice
  if (document.getElementById('sn-text-'+sn.id)) return;

  const overlay = document.createElement('div');
  overlay.id = 'sn-text-'+sn.id;
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:7000;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)';

  const card = document.createElement('div');
  card.style.cssText = 'background:#1a1a1a;border:1px solid #333;border-radius:20px;padding:28px;max-width:420px;width:100%;animation:slidein .25s ease;box-shadow:0 16px 48px rgba(0,0,0,.6)';
  card.innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
      <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#9b27af,#e040fb);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">🔔</div>
      <div><div style="font-size:15px;font-weight:700;color:#fff">${esc(sn.title)}</div><div style="font-size:11px;color:#777">od Dmytrii Barabash</div></div>
    </div>
    ${sn.message ? `<div style="font-size:13px;color:#bbb;line-height:1.65;margin-bottom:20px">${esc(sn.message)}</div>` : ''}
    <button id="sn-close-${sn.id}" style="width:100%;padding:11px;background:linear-gradient(135deg,#e040fb,#c0392b);color:#fff;border:none;border-radius:10px;font-weight:600;font-size:13px;cursor:pointer;font-family:inherit">Rozumiem</button>
  `;
  overlay.appendChild(card);
  document.body.appendChild(overlay);

  card.querySelector('#sn-close-'+sn.id).addEventListener('click', async () => {
    overlay.remove();
    // Mark dismissed
    await fetch(`${SB}/rest/v1/scheduled_notifications?id=eq.${sn.id}`,{method:'PATCH',headers:hdr(),body:JSON.stringify({dismissed_at:new Date().toISOString(),is_active:false})});
  });
}

function showMeetingPopup(sn) {
  const popupId = 'sn-meet-popup-'+sn.id;
  const widgetId = 'sn-meet-widget-'+sn.id;

  // If widget already shown don't re-show popup
  if (document.getElementById(widgetId)) return;
  if (document.getElementById(popupId)) return;

  const meetTime = new Date(sn.scheduled_at);

  const overlay = document.createElement('div');
  overlay.id = popupId;
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:7000;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)';

  const card = document.createElement('div');
  card.style.cssText = 'background:#1a1a1a;border:1px solid rgba(224,64,251,.3);border-radius:20px;padding:28px;max-width:440px;width:100%;animation:slidein .25s ease;box-shadow:0 16px 48px rgba(0,0,0,.7)';
  card.innerHTML = `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:18px">
      <div style="width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,#9b27af,#e040fb);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">📅</div>
      <div>
        <div style="font-size:15px;font-weight:700;color:#fff">${esc(sn.title)}</div>
        <div style="font-size:12px;color:#e040fb;margin-top:3px">${meetTime.toLocaleDateString('pl-PL',{weekday:'long',day:'numeric',month:'long'})} · ${meetTime.toLocaleTimeString('pl-PL',{hour:'2-digit',minute:'2-digit'})}</div>
      </div>
    </div>
    ${sn.message ? `<div style="font-size:13px;color:#bbb;line-height:1.65;margin-bottom:16px">${esc(sn.message)}</div>` : ''}
    <div id="meet-countdown-${sn.id}" style="text-align:center;font-size:13px;color:#777;margin-bottom:18px"></div>
    <div style="display:flex;gap:10px">
      <a href="${esc(sn.meet_url||'#')}" target="_blank" rel="noopener" style="flex:1;padding:12px;background:linear-gradient(135deg,#e040fb,#c0392b);color:#fff;border:none;border-radius:10px;font-weight:700;font-size:14px;text-align:center;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:6px">
        <span>🎥</span> Dołącz do spotkania
      </a>
      <button id="meet-minimize-${sn.id}" style="padding:12px 16px;background:rgba(255,255,255,.05);color:#aaa;border:1px solid #333;border-radius:10px;font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap">Minimalizuj</button>
    </div>
  `;
  overlay.appendChild(card);
  document.body.appendChild(overlay);

  // Countdown timer
  function updateCountdown() {
    const diff = meetTime - Date.now();
    const el = document.getElementById('meet-countdown-'+sn.id);
    if (!el) return;
    if (diff <= 0) { el.textContent = '🟢 Spotkanie trwa!'; el.style.color='#4ade80'; return; }
    const h=Math.floor(diff/3600000), m=Math.floor((diff%3600000)/60000), s=Math.floor((diff%60000)/1000);
    el.textContent = h>0 ? `Za ${h}h ${m}min` : m>0 ? `Za ${m} min ${s}s` : `Za ${s} sekund`;
  }
  updateCountdown();
  const countdownIv = setInterval(updateCountdown, 1000);

  // Minimize → show floating widget
  card.querySelector('#meet-minimize-'+sn.id).addEventListener('click', () => {
    clearInterval(countdownIv);
    overlay.remove();
    showMeetingWidget(sn, meetTime);
  });

  // Click outside → minimize
  overlay.addEventListener('click', e => {
    if (e.target === overlay) {
      clearInterval(countdownIv);
      overlay.remove();
      showMeetingWidget(sn, meetTime);
    }
  });
}

function showMeetingWidget(sn, meetTime) {
  const widgetId = 'sn-meet-widget-'+sn.id;
  if (document.getElementById(widgetId)) return;

  const widget = document.createElement('div');
  widget.id = widgetId;
  widget.style.cssText = 'position:fixed;bottom:20px;right:20px;z-index:6000;background:#1a1a1a;border:1px solid rgba(224,64,251,.4);border-radius:14px;padding:12px 16px;cursor:pointer;box-shadow:0 6px 24px rgba(0,0,0,.5);display:flex;align-items:center;gap:10px;min-width:200px;animation:popIn .35s cubic-bezier(.34,1.56,.64,1);transition:opacity .2s';
  widget.innerHTML = `
    <span style="font-size:20px">📅</span>
    <div style="flex:1;min-width:0">
      <div style="font-size:12px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(sn.title)}</div>
      <div id="widget-time-${sn.id}" style="font-size:11px;color:#e040fb;margin-top:2px"></div>
    </div>
    <span style="font-size:11px;color:#555;flex-shrink:0">●</span>
  `;
  document.body.appendChild(widget);

  // Mini countdown
  function updateWidget() {
    const diff = meetTime - Date.now();
    const el = document.getElementById('widget-time-'+sn.id);
    if (!el) return;
    if (diff <= -3600000) { // 1h past → remove
      widget.remove();
      fetch(`${SB}/rest/v1/scheduled_notifications?id=eq.${sn.id}`,{method:'PATCH',headers:hdr(),body:JSON.stringify({is_active:false})});
      return;
    }
    if (diff <= 0) { el.textContent='🟢 Trwa teraz!'; el.style.color='#4ade80'; return; }
    const h=Math.floor(diff/3600000), m=Math.floor((diff%3600000)/60000);
    el.textContent = h>0 ? `Za ${h}h ${m}min` : `Za ${m} min`;
  }
  updateWidget();
  const iv = setInterval(updateWidget, 30000);

  // Click widget → reopen popup
  widget.addEventListener('click', () => {
    clearInterval(iv);
    widget.remove();
    showMeetingPopup(sn);
  });
}
